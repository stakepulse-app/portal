<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StakePulse — Portal</title>
<style>
:root{--bg:#080d12;--bg2:#0d1520;--bg3:#111d2a;--border:#1a2d3d;--text:#c8d8e8;--text2:#6a8a9a;--text3:#3a5a6a;--green:#00ff88;--amber:#ffd700;--blue:#00d4ff;--purple:#a855f7;--orange:#ff8c00;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,212,255,.05),transparent 60%);pointer-events:none;}

/* Lang toggle */
.lang-toggle{position:fixed;bottom:20px;left:20px;display:flex;gap:4px;z-index:200;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;}
.lang-btn{background:transparent;border:none;color:var(--text2);font-size:12px;font-weight:700;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .2s;}
.lang-btn.active{background:var(--bg3);color:var(--text);}
.lang-btn:hover{color:var(--text);}

.header{text-align:center;margin-bottom:2.5rem;}
.header-logo{font-size:44px;margin-bottom:10px;}
.header-title{font-size:26px;font-weight:900;}
.header-sub{font-size:13px;color:var(--text2);margin-top:5px;}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--green);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:8px;}
.header-badge::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:780px;}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:12px;transition:all .2s;position:relative;overflow:hidden;height:260px;}
.card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;pointer-events:none;}
.card:hover{transform:translateY(-3px);}
.card:hover::before{opacity:1;}

.card-wct{border-color:rgba(0,212,255,.2);}
.card-wct::before{background:radial-gradient(ellipse at top left,rgba(0,212,255,.07),transparent 70%);}
.card-wct:hover{box-shadow:0 8px 28px rgba(0,212,255,.1);border-color:rgba(0,212,255,.4);}
.card-rain{border-color:rgba(0,255,136,.2);}
.card-rain::before{background:radial-gradient(ellipse at top left,rgba(0,255,136,.07),transparent 70%);}
.card-rain:hover{box-shadow:0 8px 28px rgba(0,255,136,.1);border-color:rgba(0,255,136,.4);}
.card-hr{border-color:rgba(255,140,0,.2);}
.card-hr::before{background:radial-gradient(ellipse at top left,rgba(255,140,0,.07),transparent 70%);}
.card-hr:hover{box-shadow:0 8px 28px rgba(255,140,0,.1);border-color:rgba(255,140,0,.4);}
.card-promo{border-color:rgba(255,215,0,.2);}
.card-promo::before{background:radial-gradient(ellipse at top left,rgba(255,215,0,.07),transparent 70%);}
.card-promo:hover{box-shadow:0 8px 28px rgba(255,215,0,.1);border-color:rgba(255,215,0,.4);}

.card-top{display:flex;align-items:center;justify-content:space-between;}
.card-emoji{font-size:32px;line-height:1;}
.card-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;}
.badge-live{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3);}
.badge-promo{background:rgba(255,215,0,.15);color:var(--amber);border:1px solid rgba(255,215,0,.3);}
.badge-new{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3);}
.badge-cours{background:rgba(255,140,0,.15);color:var(--orange);border:1px solid rgba(255,140,0,.3);}

.card-title{font-size:17px;font-weight:800;}
.card-sub{font-size:12px;color:var(--text2);line-height:1.5;flex:1;}
.card-features{display:flex;flex-direction:column;gap:5px;}
.card-feature{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.card-feature::before{content:'·';font-size:14px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);}
.card-open{font-size:11px;font-weight:700;}
.card-wct .card-open{color:var(--blue);}
.card-rain .card-open{color:var(--green);}
.card-hr .card-open{color:var(--orange);}
.card-promo .card-open{color:var(--amber);}
.card-arrow{font-size:14px;transition:transform .2s;}
.card-wct .card-arrow{color:var(--blue);}
.card-rain .card-arrow{color:var(--green);}
.card-hr .card-arrow{color:var(--orange);}
.card-promo .card-arrow{color:var(--amber);}
.card:hover .card-arrow{transform:translateX(4px);}

.footer{margin-top:2rem;text-align:center;font-size:11px;color:var(--text3);}
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('fr')">🇫🇷 FR</button>
  <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
</div>

<div class="header">
  <div class="header-logo">⚡</div>
  <div class="header-title">StakePulse</div>
  <div class="header-sub" data-fr="Tableau de bord communautaire Stake" data-en="Stake community dashboard"></div>
  <div class="header-badge">LIVE</div>
</div>

<div class="grid">

  <a class="card card-wct" href="https://tournament-wct.github.io/tournament" target="_blank">
    <div class="card-top">
      <div class="card-emoji">🌍</div>
      <span class="card-badge badge-promo" data-fr="Promo active" data-en="Active promo"></span>
    </div>
    <div class="card-title">World Chat Tournament</div>
    <div class="card-sub" data-fr="Classement en temps réel du tournoi mondial 2026 — 21 chats, paris sportifs vérifiés." data-en="Real-time leaderboard of the 2026 World Chat Tournament — 21 chat rooms, verified sports bets."></div>
    <div class="card-features">
      <div class="card-feature" data-fr="Classement par chat & joueur" data-en="Ranking by chat room & player"></div>
      <div class="card-feature" data-fr="Feed live + top 20 par chat" data-en="Live feed + top 20 per chat room"></div>
      <div class="card-feature" data-fr="Multiplicateur x3 actif (hors FR)" data-en="x3 multiplier active (excluding FR)"></div>
    </div>
    <div class="card-footer">
      <span class="card-open" data-fr="Ouvrir le dashboard" data-en="Open dashboard"></span>
      <span class="card-arrow">→</span>
    </div>
  </a>

  <a class="card card-rain" href="https://stakepulse-app.github.io/rain" target="_blank">
    <div class="card-top">
      <div class="card-emoji">🌧</div>
      <span class="card-badge badge-live">Live</span>
    </div>
    <div class="card-title">Rains Live</div>
    <div class="card-sub" data-fr="Suivi en temps réel de toutes les rains sur Stake — volume, rainers, stats par chat." data-en="Real-time tracking of all Stake rains — volume, rainers, stats per chat room."></div>
    <div class="card-features">
      <div class="card-feature" data-fr="Feed live toutes les 10s" data-en="Live feed every 10 seconds"></div>
      <div class="card-feature" data-fr="Top rainers & receveurs" data-en="Top rainers & recipients"></div>
      <div class="card-feature" data-fr="Alertes grosses rains" data-en="Big rain alerts"></div>
    </div>
    <div class="card-footer">
      <span class="card-open" data-fr="Ouvrir le dashboard" data-en="Open dashboard"></span>
      <span class="card-arrow">→</span>
    </div>
  </a>

  <a class="card card-hr" href="https://stakepulse-app.github.io/hr" target="_blank">
    <div class="card-top">
      <div class="card-emoji">🔥</div>
      <span class="card-badge badge-new" data-fr="Nouveau" data-en="New"></span>
    </div>
    <div class="card-title">High Rollers Live</div>
    <div class="card-sub" data-fr="Détection en temps réel des gros parieurs sur tous les chats Stake." data-en="Real-time detection of high rollers across all Stake chat rooms."></div>
    <div class="card-features">
      <div class="card-feature" data-fr="Feed live par chat" data-en="Live feed per chat room"></div>
      <div class="card-feature" data-fr="Leaderboard & records" data-en="Leaderboard & records"></div>
      <div class="card-feature" data-fr="Alertes sur les méga bets" data-en="Mega bet alerts"></div>
    </div>
    <div class="card-footer">
      <span class="card-open" data-fr="Ouvrir le dashboard" data-en="Open dashboard"></span>
      <span class="card-arrow">→</span>
    </div>
  </a>

  <a class="card card-promo" href="https://stakepulse-app.github.io/promo" target="_blank">
    <div class="card-top">
      <div class="card-emoji">🎁</div>
      <span class="card-badge badge-cours" data-fr="En cours" data-en="Ongoing"></span>
    </div>
    <div class="card-title" data-fr="Promotions" data-en="Promotions"></div>
    <div class="card-sub" data-fr="Toutes les promos Stake actives — règles, dates limites et dashboards associés." data-en="All active Stake promotions — rules, deadlines and associated dashboards."></div>
    <div class="card-features">
      <div class="card-feature" data-fr="WCT x3 (hors FR) jusqu'au 3 juillet" data-en="WCT x3 (excl. FR) until July 3rd"></div>
      <div class="card-feature" data-fr="Stake VS Eddie — Elemental Ways" data-en="Stake VS Eddie — Elemental Ways"></div>
      <div class="card-feature" data-fr="Mises à jour en temps réel" data-en="Real-time updates"></div>
    </div>
    <div class="card-footer">
      <span class="card-open" data-fr="Voir les promos" data-en="View promotions"></span>
      <span class="card-arrow">→</span>
    </div>
  </a>

</div>

<div class="footer" data-fr="StakePulse · Outils communautaires non officiels · Stake n'est pas affilié" data-en="StakePulse · Unofficial community tools · Not affiliated with Stake"></div>

<script>
const translations = document.querySelectorAll('[data-fr]');

function setLang(lang) {
  // Mettre à jour tous les éléments traduisibles
  translations.forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`);
  });

  // Mettre à jour les boutons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(lang.toUpperCase()));
  });

  // Mettre à jour la balise html lang
  document.documentElement.setAttribute('lang', lang);

  // Sauvegarder la préférence
  localStorage.setItem('sp_lang', lang);
}

// Appliquer la langue sauvegardée ou FR par défaut
const savedLang = localStorage.getItem('sp_lang') || 'fr';
setLang(savedLang);
</script>

</body>
</html>
